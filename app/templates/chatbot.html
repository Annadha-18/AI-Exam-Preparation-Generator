<!DOCTYPE html>
<html>
<head>

<title>AI Chatbot</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.chat-box{
    height:400px;
    overflow-y:auto;
    border:1px solid #ddd;
    padding:10px;
    border-radius:10px;
    background:white;
}

.user{
    text-align:right;
    color:blue;
    margin:5px;
}

.bot{
    text-align:left;
    color:green;
    margin:5px;
}

</style>

</head>

<body class="container mt-4">

<h3>🤖 AI Study Assistant</h3>

<div class="chat-box mb-3" id="chatBox"></div>

<input type="text" id="message" class="form-control mb-2" placeholder="Ask something..." onkeypress="handleEnter(event)">

<button onclick="sendMessage()" class="btn btn-primary">Send</button>

<script>

function sendMessage(){

    let msg = document.getElementById("message").value.trim();

    if(msg === "") return;

    let chatBox = document.getElementById("chatBox");

    // Show user message
    chatBox.innerHTML += `<div class="user">${msg}</div>`;

    // Auto scroll
    chatBox.scrollTop = chatBox.scrollHeight;

    fetch("/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:msg})
    })
    .then(res=>res.json())
    .then(data=>{
        chatBox.innerHTML += `<div class="bot">${data.reply || data.error}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    })
    .catch(err=>{
        chatBox.innerHTML += `<div class="bot">Error: ${err}</div>`;
    });

    document.getElementById("message").value="";
}

// Enter key support
function handleEnter(event){
    if(event.key === "Enter"){
        sendMessage();
    }
}

</script>

</body>
</html>
