<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            background:#f5f7fa;
        }

        .card{
            border:none;
            border-radius:12px;
            box-shadow:0 4px 12px rgba(0,0,0,.1);
        }

        .chart-box{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 4px 12px rgba(0,0,0,.1);
        }

    </style>

</head>

<body>

{% include "navbar.html" %}

<div class="container mt-4">

<h3>Welcome {{ user.full_name }} 👋</h3>

<div class="row mt-4">

<div class="col-md-3">
<div class="card p-3 text-center">
<h5>Uploaded Notes</h5>
<h2>{{ stats.notes }}</h2>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">
<h5>Quizzes Taken</h5>
<h2>{{ stats.quizzes }}</h2>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">
<h5>Average</h5>
<h2>{{ stats.average }}%</h2>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">
<h5>Highest</h5>
<h2>{{ stats.highest }}%</h2>
</div>
</div>

</div>


<div class="row mt-5">

<div class="col-md-6">

<div class="chart-box">

<h5>Quiz Performance</h5>

<canvas id="lineChart"></canvas>

</div>

</div>


<div class="col-md-6">

<div class="chart-box text-center">

<h5>Performance Graph</h5>

<img
src="{{ url_for('static', filename=chart_file) }}"
class="img-fluid">

</div>

</div>

</div>

<hr class="my-5">

<h4>Quick Actions</h4>

<div class="list-group">

<a class="list-group-item"
href="{{ url_for('upload.upload') }}">
Upload Notes
</a>

<a class="list-group-item"
href="{{ url_for('notes.my_notes') }}">
My Notes
</a>

<a class="list-group-item"
href="{{ url_for('result.results') }}">
Quiz Results
</a>

<a class="list-group-item"
href="{{ url_for('auth.logout') }}">
Logout
</a>

</div>

</div>

<script>

const labels={{ quiz_labels|tojson }};
const scores={{ quiz_scores|tojson }};

new Chart(document.getElementById("lineChart"),{

type:"line",

data:{

labels:labels,

datasets:[{

label:"Quiz Score",

data:scores,

borderWidth:3,

fill:true,

tension:.3

}]

}

});

</script>

</body>

</html>
